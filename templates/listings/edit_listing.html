{% extends 'base.html' %}

{% block title %}E'lonni tahrirlash | BizBozor{% endblock %}

{% block content %}
<section class="page-section">
    <div class="container" style="max-width: 700px;">
        <h1 class="page-title">E'lonni tahrirlash</h1>
        <p class="page-subtitle">{{ listing.title }}</p>

        <form method="post" enctype="multipart/form-data"
              style="background:#fff; padding:24px; border-radius:16px; border:1px solid #e5e7eb;">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">Saqlash</button>
        </form>
    </div>
</section>
{% endblock %}
